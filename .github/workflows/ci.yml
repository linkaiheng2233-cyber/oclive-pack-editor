name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install Linux dependencies for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target (oclive_validation)
        run: rustup target add wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Checkout pinned oclivenewnew validation crates
        run: node scripts/checkout-oclive-validation.mjs

      - name: Check json keys vs oclivenewnew
        run: npm run contract:json-keys

      - name: Build validation wasm
        run: npm run wasm:build

      - name: Test (Vitest)
        run: npm test

      - name: Build frontend
        run: npm run build

      # Linux 安装系统依赖；Windows 仅拉取 Chromium（两端使用同一 smoke 集）。
      - name: Install Playwright (Chromium, Linux)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright (Chromium, Windows)
        if: runner.os == 'Windows'
        run: npx playwright install chromium

      - name: E2E smoke
        run: npm run test:e2e

      - name: Cargo build (Tauri crate)
        run: cargo build --locked --manifest-path src-tauri/Cargo.toml

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml
