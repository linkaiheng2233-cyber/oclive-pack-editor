name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux dependencies for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target (oclive_validation)
        run: rustup target add wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Clone oclivenewnew (validation crate for wasm-pack)
        run: |
          cd "${{ github.workspace }}/.."
          git clone --depth 1 https://github.com/linkaiheng2233-cyber/oclivenewnew.git oclivenewnew

      - name: Check json keys vs oclivenewnew
        run: npm run contract:json-keys

      - name: Build validation wasm
        run: npm run wasm:build

      - name: Test (Vitest)
        run: npm test

      - name: Build frontend
        run: npm run build

      # Linux：安装系统依赖；Windows：仅拉取 Chromium 浏览器（与 smoke 一致）
      - name: Install Playwright (Chromium, Linux)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright (Chromium, Windows)
        if: runner.os == 'Windows'
        run: npx playwright install chromium

      - name: E2E smoke
        run: npm run test:e2e

      - name: Cargo build (Tauri crate)
        run: cargo build --manifest-path src-tauri/Cargo.toml
