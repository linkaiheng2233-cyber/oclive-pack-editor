# 标签 push（v*）或手动运行时，在 Windows 完成 wasm、测试和 Tauri build，并上传 bundle。
# 与 CI 共用 `.github/oclive-validation-ref` 锁定的校验 crate 版本。

name: Release build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - run: npm ci

      - name: Checkout pinned oclivenewnew validation crates
        run: node scripts/checkout-oclive-validation.mjs

      - run: npm run contract:json-keys

      - run: npm run wasm:build

      - run: npm test

      - name: Tauri build
        run: npm run tauri:build

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: oclive-pack-editor-${{ github.ref_name }}-${{ github.run_id }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error
