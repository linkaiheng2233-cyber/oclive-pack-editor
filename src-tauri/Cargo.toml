[package]
name = "oclive-pack-editor-tauri"
version = "0.0.0"
edition = "2021"
license = "MIT"
description = "oclive role pack editor — Tauri shell"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.5", features = ["protocol-asset", "dialog-open"] }
serde = { version = "1.0", features = ["derive"] }

[profile.release]
opt-level = "z"
lto = true
